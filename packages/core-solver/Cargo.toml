[package]
name = "core-solver"
version = "0.0.0"
edition = "2021"
description = "ZZZ Optimizer solver core (Rust -> WASM)"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
console_error_panic_hook = { version = "0.1", optional = true }

[features]
default = ["console_error_panic_hook"]
# Enables detailed per-node solver tracing. OFF in the hot loop by default.
trace-solver = []
